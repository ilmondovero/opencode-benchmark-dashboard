name: Deploy dashboard to GitHub Pages

# Ricostruisce la dashboard STATICA dai results committati e la pubblica su Pages.
# NON esegue benchmark in CI (nessuna chiave Ollama serve qui): legge solo results/.
on:
  push:
    branches: [master]
    paths:
      - "results/**"
      - "public/**"
      - "src/dashboard.ts"
      - "src/export-static.ts"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile || bun install
      - run: bun run export:static
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
